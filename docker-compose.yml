services:
  signal-cli-rest-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-api
    restart: unless-stopped
    environment:
      - MODE=native
    ports:
      - "127.0.0.1:${SIGNAL_API_PORT:-8080}:8080"
    volumes:
      - ./signal-cli-config:/home/.local/share/signal-cli
